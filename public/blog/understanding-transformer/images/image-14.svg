<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1060" width="100%" style="font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #ffffff;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#64748b" />
    </marker>
    <marker id="arr-enc" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#2563eb" />
    </marker>
    <marker id="arr-dec" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#ea580c" />
    </marker>
    <linearGradient id="enc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="dec-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="1060" fill="#ffffff"/>

  <!-- ═══════════════ TITLE ═══════════════ -->
  <text x="450" y="46" font-size="20" font-weight="700" text-anchor="middle" fill="#0f172a" letter-spacing="0.5">TRANSFORMER ARCHITECTURE</text>
  <text x="450" y="64" font-size="12" text-anchor="middle" fill="#94a3b8" letter-spacing="1.5">VASWANI ET AL., 2017 — "ATTENTION IS ALL YOU NEED"</text>
  <line x1="80" y1="76" x2="820" y2="76" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ═══════════════ INPUT TOKENS ═══════════════ -->
  <rect x="310" y="94" width="280" height="38" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="118" font-size="13" font-weight="600" text-anchor="middle" fill="#64748b">INPUT TOKENS</text>
  <line x1="450" y1="132" x2="450" y2="158" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════ ENCODER SECTION ═══════════════ -->
  <rect x="60" y="158" width="380" height="400" rx="10" fill="url(#enc-grad)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="250" y="182" font-size="11" font-weight="700" text-anchor="middle" fill="#1d4ed8" letter-spacing="1.5">ENCODER STACK</text>

  <!-- Encoder: Embedding -->
  <rect x="90" y="194" width="320" height="44" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="250" y="213" font-size="13" font-weight="600" text-anchor="middle" fill="#1d4ed8">① Embedding</text>
  <text x="250" y="231" font-size="10.5" text-anchor="middle" fill="#64748b">Word ID → 512-dim vector</text>

  <!-- Encoder: Positional Encoding -->
  <rect x="90" y="252" width="320" height="44" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="250" y="271" font-size="13" font-weight="600" text-anchor="middle" fill="#1d4ed8">② + Positional Encoding</text>
  <text x="250" y="289" font-size="10.5" text-anchor="middle" fill="#64748b">Injects word order via sin/cos waves</text>

  <!-- Encoder Layer Block -->
  <rect x="90" y="310" width="320" height="200" rx="8" fill="#bfdbfe" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="115" y="328" font-size="10" font-weight="700" fill="#1e40af" letter-spacing="1">× 6 ENCODER LAYERS</text>

  <rect x="106" y="336" width="288" height="32" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="250" y="358" font-size="12" font-weight="600" text-anchor="middle" fill="#1d4ed8">③ Multi-Head Self-Attention</text>

  <rect x="106" y="378" width="288" height="26" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="250" y="396" font-size="11" text-anchor="middle" fill="#94a3b8">Add &amp; Norm</text>

  <rect x="106" y="414" width="288" height="32" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="250" y="435" font-size="12" font-weight="600" text-anchor="middle" fill="#1d4ed8">④ Feed-Forward Network (2048)</text>

  <rect x="106" y="456" width="288" height="26" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="250" y="474" font-size="11" text-anchor="middle" fill="#94a3b8">Add &amp; Norm</text>

  <!-- Encoder output -->
  <line x1="250" y1="524" x2="250" y2="542" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-enc)"/>
  <rect x="130" y="544" width="240" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="250" y="563" font-size="11" font-weight="600" text-anchor="middle" fill="#1d4ed8">Rich Contextual Representation</text>

  <!-- Cross-attention bridge -->
  <path d="M 430 558 L 690 558 L 690 710 L 560 710" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr)"/>
  <text x="730" y="640" font-size="10" font-weight="700" fill="#7c3aed" transform="rotate(90 730 640)">CROSS-ATTENTION</text>

  <!-- ═══════════════ DECODER SECTION ═══════════════ -->
  <rect x="460" y="158" width="380" height="510" rx="10" fill="url(#dec-grad)" stroke="#ea580c" stroke-width="1.5"/>
  <text x="650" y="182" font-size="11" font-weight="700" text-anchor="middle" fill="#c2410c" letter-spacing="1.5">DECODER STACK</text>

  <!-- Target tokens input -->
  <rect x="490" y="194" width="320" height="44" rx="6" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
  <text x="650" y="213" font-size="13" font-weight="600" text-anchor="middle" fill="#c2410c">TARGET TOKENS  (&lt;start&gt;, ...)</text>
  <text x="650" y="231" font-size="10.5" text-anchor="middle" fill="#78716c">Shifted right during training</text>

  <!-- Decoder: Embedding + PE -->
  <rect x="490" y="252" width="320" height="44" rx="6" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
  <text x="650" y="271" font-size="13" font-weight="600" text-anchor="middle" fill="#c2410c">Embedding + Positional Encoding</text>
  <text x="650" y="289" font-size="10.5" text-anchor="middle" fill="#78716c">Same technique as encoder side</text>

  <!-- Decoder Layer Block -->
  <rect x="490" y="310" width="320" height="312" rx="8" fill="#fde68a" stroke="#d97706" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="515" y="328" font-size="10" font-weight="700" fill="#b45309" letter-spacing="1">× 6 DECODER LAYERS</text>

  <rect x="506" y="336" width="288" height="32" rx="4" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="650" y="358" font-size="12" font-weight="600" text-anchor="middle" fill="#c2410c">① Masked Self-Attention</text>

  <rect x="506" y="378" width="288" height="26" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="650" y="396" font-size="11" text-anchor="middle" fill="#94a3b8">Add &amp; Norm</text>

  <!-- Cross attention highlighted row -->
  <rect x="506" y="414" width="288" height="40" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="650" y="432" font-size="12" font-weight="700" text-anchor="middle" fill="#6d28d9">② Cross-Attention  (← reads encoder)</text>
  <text x="650" y="448" font-size="9.5" text-anchor="middle" fill="#8b5cf6">Q from decoder · K,V from encoder</text>

  <rect x="506" y="464" width="288" height="26" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="650" y="482" font-size="11" text-anchor="middle" fill="#94a3b8">Add &amp; Norm</text>

  <rect x="506" y="500" width="288" height="32" rx="4" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="650" y="521" font-size="12" font-weight="600" text-anchor="middle" fill="#c2410c">③ Feed-Forward Network (2048)</text>

  <rect x="506" y="542" width="288" height="26" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="650" y="560" font-size="11" text-anchor="middle" fill="#94a3b8">Add &amp; Norm</text>

  <!-- Decoder to linear -->
  <line x1="650" y1="634" x2="650" y2="688" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-dec)"/>

  <!-- Linear + Softmax -->
  <rect x="500" y="690" width="300" height="44" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="650" y="708" font-size="13" font-weight="600" text-anchor="middle" fill="#6d28d9">Linear + Softmax</text>
  <text x="650" y="726" font-size="10.5" text-anchor="middle" fill="#78716c">Score over target vocabulary</text>

  <line x1="650" y1="734" x2="650" y2="768" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output token -->
  <rect x="490" y="770" width="320" height="44" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="650" y="794" font-size="13" font-weight="700" text-anchor="middle" fill="#15803d">🎯  Next Token Predicted</text>
  <text x="650" y="809" font-size="10.5" text-anchor="middle" fill="#78716c">🔁  Auto-regressive generation</text>

  <!-- ═══════════════ LEGEND ═══════════════ -->
  <rect x="60" y="856" width="780" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="80" y="875" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="1.5">LEGEND</text>

  <rect x="80" y="886" width="12" height="12" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="98" y="897" font-size="11" fill="#1d4ed8">Encoder component</text>

  <rect x="225" y="886" width="12" height="12" rx="2" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
  <text x="243" y="897" font-size="11" fill="#c2410c">Decoder component</text>

  <rect x="370" y="886" width="12" height="12" rx="2" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="388" y="897" font-size="11" fill="#6d28d9">Cross-attention bridge</text>

  <rect x="540" y="886" width="12" height="12" rx="2" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="558" y="897" font-size="11" fill="#64748b">Input / Output nodes</text>

  <!-- Footer note -->
  <text x="450" y="940" font-size="11" text-anchor="middle" fill="#cbd5e1">Vaswani et al. 2017  ·  d_model=512  ·  h=8 heads  ·  N=6 layers  ·  d_ff=2048</text>
</svg>